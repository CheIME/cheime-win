# CheIME UI settings
# Edit this file, save it, then switch away from CheIME and back to reload.

window:
  # Candidate-window height in pixels. 0 = automatic.
  height: 0
  # Corner radius in pixels. It is capped at half the actual window height.
  corner_radius: 3

candidate:
  # Maximum number of candidate words shown.
  page_size: 8
  # horizontal or vertical
  orientation: horizontal
  # Show candidate numbers.
  show_labels: true

selection_box:
  # Outline color of the currently selected candidate.
  outline_color: "#0078d4"
  # null = inherit window.corner_radius; use 0 for square corners.
  corner_radius: null
  # Size relative to the candidate item, from 0.0 to 1.0.
  relative_size: 1.0

theme:
  colors:
    # Candidate-window background color (#RRGGBB or #RGB).
    background: "#ffffff"
